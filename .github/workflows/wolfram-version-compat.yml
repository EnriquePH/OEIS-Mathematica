name: Wolfram version compatibility

# Runs the offline test suite against several Wolfram Engine releases
# via the official wolframresearch/wolframengine Docker images, so a
# regression tied to one specific engine version doesn't slip in
# unnoticed. Separate from ci.yml, which only checks the OS matrix
# against whatever engine version that action currently installs.
on:
  push:
    branches: [master]
    paths:
      - 'Kernel/**'
      - 'PacletInfo.wl'
      - 'Tests/**'
      - '.github/workflows/wolfram-version-compat.yml'
  workflow_dispatch:
  schedule:
    # First of every month, to catch drift even with no local changes.
    - cron: '0 6 1 * *'

jobs:
  compat:
    name: WL ${{ matrix.version }}
    runs-on: ubuntu-latest
    container:
      image: wolframresearch/wolframengine:${{ matrix.version }}
      # Non-root default user breaks actions/checkout's writes to the
      # mounted _temp dir. See actions/checkout#956.
      options: --user root
      env:
        WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
    strategy:
      fail-fast: false
      matrix:
        # 13.0 covers the oldest release with modern PacletInfo.wl
        # support; 15.0 is current at the time this workflow was
        # written. Update this list as new engines ship.
        version: ['13.0', '13.3', '14.2', '15.0']
    steps:
      # actions/checkout needs a Node runtime newer than some of these
      # images' glibc supports (13.0 is Ubuntu 18.04, glibc 2.27; both
      # Node 20 and Node 24 now require glibc >= 2.28, so there's no
      # GitHub-supplied Node build left that runs there). Plain git
      # avoids the problem entirely since it needs no Node at all.
      - name: Check out ${{ github.sha }}
        run: |
          command -v git >/dev/null || (apt-get update -qq && apt-get install -y -qq git ca-certificates)
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init -q .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout -q FETCH_HEAD

      - name: Report engine version
        run: wolframscript -code '$Version'

      - name: Run offline tests
        run: wolframscript -file Tests/RunTests.wls --offline

      - name: Verify PacletInfo.wl loads as a PacletObject
        run: |
          wolframscript -code '
            paclet = Get["PacletInfo.wl"];
            If[Head[paclet] =!= PacletObject,
              Print["FAIL: PacletInfo.wl did not evaluate to a PacletObject on ", $Version];
              Exit[1]
            ];
            Print["OK on ", $Version, ": ", paclet[[1]]["Name"], " ", paclet[[1]]["Version"]];
          '
