name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  # wolframresearch/wolframengine's glibc predates what actions'
  # default Node 24 runtime requires (GLIBC_2.28 not found), so pin
  # the runner back to Node 20 for running actions in that container.
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: wolframresearch/wolframengine:latest
      # The image's default user isn't root and doesn't match the
      # runner's UID, which breaks actions/checkout's writes to the
      # mounted _temp dir (EACCES on save_state/issueFileCommand).
      # See https://github.com/actions/checkout/issues/956.
      options: --user root
      env:
        WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
    steps:
      - uses: actions/checkout@v4

      - name: Run offline tests (ID validation, URL building)
        run: wolframscript -file Tests/RunTests.wls --offline

      - name: Run full test suite (hits the live OEIS API)
        # The OEIS server is a third party dependency outside our
        # control; don't fail the whole matrix if it is briefly
        # unreachable or slow, but still surface the result.
        continue-on-error: true
        run: wolframscript -file Tests/RunTests.wls

  syntax-check:
    name: PacletInfo.wl / source syntax
    runs-on: ubuntu-latest
    container:
      image: wolframresearch/wolframengine:latest
      options: --user root
      env:
        WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
    steps:
      - uses: actions/checkout@v4

      - name: Load PacletInfo.wl and Kernel/OEIS.wl
        run: |
          wolframscript -code '
            paclet = Get["PacletInfo.wl"];
            If[Head[paclet] =!= PacletObject, Print["PacletInfo.wl did not evaluate to a PacletObject"]; Exit[1]];
            Get["Kernel/OEIS.wl"];
            If[Context[OEISbFile] =!= "OEIS`", Print["OEISbFile not defined in OEIS` context"]; Exit[1]];
            Print["OK: ", paclet[[1]]["Name"], " ", paclet[[1]]["Version"]];
          '
