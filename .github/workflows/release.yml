name: Build and attach paclet on release

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  # wolframresearch/wolframengine's glibc predates what actions'
  # default Node 24 runtime requires (GLIBC_2.28 not found), so pin
  # the runner back to Node 20 for running actions in that container.
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-paclet:
    name: Build .paclet archive
    runs-on: ubuntu-latest
    container:
      image: wolframresearch/wolframengine:latest
      # Non-root default user breaks actions/checkout's writes to the
      # mounted _temp dir. See actions/checkout#956.
      options: --user root
      env:
        WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
    steps:
      - uses: actions/checkout@v4

      - name: Run offline tests before building
        run: wolframscript -file Tests/RunTests.wls --offline

      - name: Build paclet archive
        run: wolframscript -file DevTools/BuildPaclet.wls build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: paclet
          path: build/*.paclet

  attach-to-release:
    name: Attach paclet to GitHub release
    needs: build-paclet
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    # Plain ubuntu-latest, not the wolframengine container: gh is
    # preinstalled here, and isn't part of that Wolfram-focused image.
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: paclet
          path: build

      - name: Attach to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" build/*.paclet --clobber
