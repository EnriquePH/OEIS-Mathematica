name: Build and attach paclet on release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-paclet:
    name: Build .paclet archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up wolframscript
        uses: WolframResearch/wolframscript-action@v1
        with:
          entitlementId: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}

      - name: Run offline tests before building
        run: wolframscript -file Tests/RunTests.wls --offline

      - name: Build paclet archive
        run: wolframscript -file DevTools/BuildPaclet.wls build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: paclet
          path: build/*.paclet

      - name: Attach to the GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" build/*.paclet --clobber
